services:
  - type: web
    name: datascience-quiz-app
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: datascience-quiz-db
          property: connectionString

databases:
  - name: datascience-quiz-db
    databaseName: datascience_quiz
    plan: free
