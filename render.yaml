services:
  - type: web
    name: datascience-quiz-app
    runtime: java
    plan: free
    buildCommand: mvn -q -DskipTests package
    startCommand: java -jar target/ds-quiz-app.jar
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: datascience-quiz-db
          property: connectionString

databases:
  - name: datascience-quiz-db
    databaseName: datascience_quiz
    plan: free
